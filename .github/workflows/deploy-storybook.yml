name: Deploy Storybook to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build tokens
        run: npm run build:tokens

      - name: Build Vue Storybook
        run: npm run build-storybook:vue -- --output-dir storybook-static-vue

      - name: Build React Storybook
        run: npm run build-storybook:react -- --output-dir storybook-static-react

      - name: Assemble pages artifact
        run: |
          mkdir -p storybook-pages/vue
          mkdir -p storybook-pages/react
          cp -r storybook-static-vue/. storybook-pages/vue/
          cp -r storybook-static-react/. storybook-pages/react/
          cat > storybook-pages/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>@next/design-system — Storybook</title>
            <style>
              body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; gap: 24px; }
              h1 { font-size: 1.5rem; margin: 0; }
              .links { display: flex; gap: 16px; }
              a { display: inline-block; padding: 12px 24px; background: #0071dc; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; }
              a:hover { background: #004293; }
              a.react { background: #61dafb; color: #000; }
              a.react:hover { background: #21c7f0; }
            </style>
          </head>
          <body>
            <h1>@next/design-system</h1>
            <div class="links">
              <a href="vue/">Vue Storybook</a>
              <a href="react/" class="react">React Storybook</a>
            </div>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
